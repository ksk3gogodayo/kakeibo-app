<div class="app-root">
  @if (loading) {
    <div class="loading">{{ lang.t.loading }}</div>
  } @else if (!user) {
    <app-login />
  } @else {
    <header class="app-header">
      <span class="app-title">{{ lang.t.appTitle }}</span>

      <div class="lang-switcher">
        <button [class.active]="lang.lang === 'ja'" (click)="setLang('ja')">日本語</button>
        <button [class.active]="lang.lang === 'en'" (click)="setLang('en')">EN</button>
        <button [class.active]="lang.lang === 'fil'" (click)="setLang('fil')">FIL</button>
      </div>

      <button class="logout-btn" (click)="logout()">{{ lang.t.logout }}</button>
    </header>

    <main class="app-main">
      @if (activeTab === 'entries') {
        <app-entries />
      } @else if (activeTab === 'summary') {
        <app-summary />
      } @else if (activeTab === 'settings') {
        <app-settings />
      }
    </main>

    <nav class="bottom-nav">
      <button class="nav-item" [class.active]="activeTab === 'entries'" (click)="activeTab = 'entries'">
        <span class="nav-icon">✏️</span>
        <span class="nav-label">{{ lang.t.tabRecord }}</span>
      </button>
      <button class="nav-item" [class.active]="activeTab === 'summary'" (click)="activeTab = 'summary'">
        <span class="nav-icon">📊</span>
        <span class="nav-label">{{ lang.t.tabSummary }}</span>
      </button>
      <button class="nav-item" [class.active]="activeTab === 'settings'" (click)="activeTab = 'settings'">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">{{ lang.t.tabSettings }}</span>
      </button>
    </nav>
  }
</div>
