<div>
  @if (loading) {
    <p>読み込み中...</p>
  } @else if (!user) {
    <app-login />
  } @else {
    <div>
      <header style="display:flex; align-items:center; gap:16px; padding:8px 16px; border-bottom:1px solid #ddd;">
        <span style="flex:1">{{ user.email }}</span>
        <nav style="display:flex; gap:8px;">
          <button [style.font-weight]="activeTab === 'entries' ? 'bold' : 'normal'" (click)="activeTab = 'entries'">記録</button>
          <button [style.font-weight]="activeTab === 'summary' ? 'bold' : 'normal'" (click)="activeTab = 'summary'">集計</button>
          <button [style.font-weight]="activeTab === 'settings' ? 'bold' : 'normal'" (click)="activeTab = 'settings'">設定</button>
        </nav>
        <button (click)="logout()">ログアウト</button>
      </header>

      @if (activeTab === 'entries') {
        <app-entries />
      } @else if (activeTab === 'summary') {
        <app-summary />
      } @else if (activeTab === 'settings') {
        <app-settings />
      }
    </div>
  }
</div>
