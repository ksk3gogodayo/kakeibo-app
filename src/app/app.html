<div class="app-root">
  @if (loading) {
    <div class="loading">読み込み中...</div>
  } @else if (!user) {
    <app-login />
  } @else {
    <header class="app-header">
      <span class="app-title">家計簿</span>
      <button class="logout-btn" (click)="logout()">ログアウト</button>
    </header>

    <main class="app-main">
      @if (activeTab === 'entries') {
        <app-entries />
      } @else if (activeTab === 'summary') {
        <app-summary />
      } @else if (activeTab === 'settings') {
        <app-settings />
      }
    </main>

    <nav class="bottom-nav">
      <button class="nav-item" [class.active]="activeTab === 'entries'" (click)="activeTab = 'entries'">
        <span class="nav-icon">✏️</span>
        <span class="nav-label">記録</span>
      </button>
      <button class="nav-item" [class.active]="activeTab === 'summary'" (click)="activeTab = 'summary'">
        <span class="nav-icon">📊</span>
        <span class="nav-label">集計</span>
      </button>
      <button class="nav-item" [class.active]="activeTab === 'settings'" (click)="activeTab = 'settings'">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">設定</span>
      </button>
    </nav>
  }
</div>
