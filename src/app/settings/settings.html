<div class="settings">
  <h2>マスターデータ設定</h2>

  <section>
    <h3>カテゴリ</h3>
    <ul>
      @for (item of categories; track item; let i = $index) {
        <li>
          <span>{{ item }}</span>
          <button (click)="deleteItem('categories', i)">削除</button>
        </li>
      }
    </ul>
    <div class="add-row">
      <input [(ngModel)]="newCategory" placeholder="新しいカテゴリ" />
      <button (click)="addItem('categories', newCategory)">追加</button>
    </div>
  </section>

  <section>
    <h3>決済方法</h3>
    <ul>
      @for (item of paymentMethods; track item; let i = $index) {
        <li>
          <span>{{ item }}</span>
          <button (click)="deleteItem('paymentMethods', i)">削除</button>
        </li>
      }
    </ul>
    <div class="add-row">
      <input [(ngModel)]="newPaymentMethod" placeholder="新しい決済方法" />
      <button (click)="addItem('paymentMethods', newPaymentMethod)">追加</button>
    </div>
  </section>

  <section>
    <h3>引き落とし方法</h3>
    <ul>
      @for (item of billingMethods; track item; let i = $index) {
        <li>
          <span>{{ item }}</span>
          <button (click)="deleteItem('billingMethods', i)">削除</button>
        </li>
      }
    </ul>
    <div class="add-row">
      <input [(ngModel)]="newBillingMethod" placeholder="新しい引き落とし方法" />
      <button (click)="addItem('billingMethods', newBillingMethod)">追加</button>
    </div>
  </section>
</div>
