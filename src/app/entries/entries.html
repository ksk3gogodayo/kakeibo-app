<div class="entries-form">
  <h2>{{ editTargetId ? '支出を編集' : '支出を登録' }}</h2>

  <label>品名</label>
  <input [(ngModel)]="entry.title" placeholder="例：スーパーで買い物" />

  <label>金額</label>
  <input type="number" [(ngModel)]="entry.amount" />

  <label>カテゴリ</label>
  <select [(ngModel)]="entry.category">
    @for (cat of categories; track cat) {
      <option [value]="cat">{{ cat }}</option>
    }
  </select>

  <label>決済方法</label>
  <select [(ngModel)]="entry.paymentMethod">
    @for (pm of paymentMethods; track pm) {
      <option [value]="pm">{{ pm }}</option>
    }
  </select>

  <label>引き落とし方法</label>
  <select [(ngModel)]="entry.billingMethod">
    @for (bm of billingMethods; track bm) {
      <option [value]="bm">{{ bm }}</option>
    }
  </select>

  <label>日付</label>
  <input type="date" [(ngModel)]="entry.date" />

  <button (click)="save()">{{ editTargetId ? '更新' : '保存' }}</button>
  @if (editTargetId) {
    <button type="button" (click)="reset()">キャンセル</button>
  }
</div>

<hr />

<div style="display:flex; align-items:center; gap:16px; margin-bottom:8px;">
  <h2 style="margin:0">支出一覧</h2>
  <button (click)="exportCsv()" [disabled]="entryList.length === 0">CSVエクスポート</button>
</div>
@if (entryList.length === 0) {
  <p>まだ記録がありません</p>
} @else {
  @for (e of entryList; track e.id) {
  <div style="border: 1px solid #ccc; padding: 8px; margin-bottom: 8px; border-radius: 4px;">
    <p>📅 {{ e.date }} | {{ e.title }} | ¥{{ e.amount }}</p>
    <p>🏷 {{ e.category }} | 💳 {{ e.paymentMethod }} | 🏦 {{ e.billingMethod }}</p>
    <button (click)="edit(e)">編集</button>
    <button (click)="delete(e.id!)">削除</button>
  </div>
  }
}
