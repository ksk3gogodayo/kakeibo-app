<div class="entries-form card">
  <h2>{{ editTargetId ? '支出を編集' : '支出を登録' }}</h2>

  <div class="field">
    <label>品名</label>
    <input [(ngModel)]="entry.title" placeholder="例：スーパーで買い物" />
  </div>

  <div class="field">
    <label>金額</label>
    <input type="number" [(ngModel)]="entry.amount" inputmode="numeric" />
  </div>

  <div class="field">
    <label>カテゴリ</label>
    <select [(ngModel)]="entry.category">
      @for (cat of categories; track cat) {
        <option [value]="cat">{{ cat }}</option>
      }
    </select>
  </div>

  <div class="field">
    <label>決済方法</label>
    <select [(ngModel)]="entry.paymentMethod">
      @for (pm of paymentMethods; track pm) {
        <option [value]="pm">{{ pm }}</option>
      }
    </select>
  </div>

  <div class="field">
    <label>引き落とし方法</label>
    <select [(ngModel)]="entry.billingMethod">
      @for (bm of billingMethods; track bm) {
        <option [value]="bm">{{ bm }}</option>
      }
    </select>
  </div>

  <div class="field">
    <label>日付</label>
    <input type="date" [(ngModel)]="entry.date" />
  </div>

  <div class="form-actions">
    <button class="btn-primary" (click)="save()">{{ editTargetId ? '更新' : '保存' }}</button>
    @if (editTargetId) {
      <button class="btn-secondary" type="button" (click)="reset()">キャンセル</button>
    }
  </div>
</div>

<div class="list-header">
  <h2>支出一覧</h2>
  <button class="btn-outline" (click)="exportCsv()" [disabled]="entryList.length === 0">CSVエクスポート</button>
</div>

@if (entryList.length === 0) {
  <p class="empty">まだ記録がありません</p>
} @else {
  @for (e of entryList; track e.id) {
    <div class="entry-card card">
      <div class="entry-main">
        <span class="entry-title">{{ e.title }}</span>
        <span class="entry-amount">¥{{ e.amount | number }}</span>
      </div>
      <div class="entry-meta">
        <span>{{ e.date }}</span>
        <span>{{ e.category }}</span>
        <span>{{ e.paymentMethod }}</span>
        <span>{{ e.billingMethod }}</span>
      </div>
      <div class="entry-actions">
        <button class="btn-sm btn-secondary" (click)="edit(e)">編集</button>
        <button class="btn-sm btn-danger" (click)="delete(e.id!)">削除</button>
      </div>
    </div>
  }
}
